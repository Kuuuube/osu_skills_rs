name: Release

on:
  push:
    tags:
      - "*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          cargo build --release
          strip target/release/osu_skills_rs
          tar -czvf target/release/osu_skills_rs_${{ github.ref_name }}_linux_x64.tar.gz -C target/release/ osu_skills_rs

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ github.ref_name }}
          draft: true
          files: target/release/osu_skills_rs_${{ github.ref_name }}_linux_x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup dependencies
        run: |
          rustup update stable
          rustup default stable

      - name: Build
        run: |
          cargo build --release
          powershell Compress-Archive target/release/osu_skills_rs.exe target/release/osu_skills_rs_${{ github.ref_name }}_windows_x64.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ github.ref_name }}
          draft: true
          files: target/release/osu_skills_rs_${{ github.ref_name }}_windows_x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}